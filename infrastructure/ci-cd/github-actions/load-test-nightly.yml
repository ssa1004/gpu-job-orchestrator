# Nightly K6 부하 테스트.
# orchestrator-api 의 SLO regression 을 조기에 탐지.
name: Load Test (Nightly)

on:
  schedule:
    - cron: '0 17 * * *'   # 매일 02:00 KST (17:00 UTC)
  workflow_dispatch:
    inputs:
      scenario:
        description: '실행할 시나리오'
        required: true
        default: 'submit-burst'
        type: choice
        options: [submit-burst, sustained, spike, callback-flood]

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: orchestrator
          POSTGRES_USER: orchestrator
          POSTGRES_PASSWORD: orchestrator
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Start orchestrator-api
        working-directory: orchestrator-api
        env:
          SPRING_PROFILES_ACTIVE: prod
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: orchestrator
          DB_USER: orchestrator
          DB_PASSWORD: orchestrator
        run: |
          ./gradlew bootRun &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/actuator/health/readiness && break
            sleep 2
          done

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run scenario
        env:
          BASE_URL: http://localhost:8080
        run: |
          SCENARIO="${{ github.event.inputs.scenario || 'submit-burst' }}"
          k6 run --summary-export=summary.json tests/load/${SCENARIO}.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: summary.json

      # SLO regression 발생 시 Slack 알림 (예시)
      - name: Notify on regression
        if: failure()
        run: |
          echo "TODO: Slack webhook 호출 — SLO 위반 발생 시 #gwp-platform 알림"
