# GPU 워커 카나리 배포 (Argo Rollouts)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gpu-worker
  namespace: gwp
  labels:
    app.kubernetes.io/name: gpu-worker
    app.kubernetes.io/part-of: gwp
    app.kubernetes.io/component: worker
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-worker
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gpu-worker

  strategy:
    canary:
      canaryService: gpu-worker-canary
      stableService: gpu-worker-stable

      trafficRouting:
        nginx:
          stableIngress: gpu-worker
          additionalIngressAnnotations:
            canary-by-header: X-Canary

      # 5% → 20% → 50% → 80% → 100%
      # GPU 워크로드라 메모리 누수/열 이슈가 부하 증가 시 나타남 → 단계별 관찰
      steps:
        - setWeight: 5
        - pause: {duration: 5m}
        - analysis:
            templates:
              - templateName: gpu-health-check
            args:
              - name: service-name
                value: gpu-worker-canary

        - setWeight: 20
        - pause: {duration: 10m}
        - analysis:
            templates:
              - templateName: worker-latency-check
              - templateName: gpu-utilization-check
            args:
              - name: service-name
                value: gpu-worker-canary

        - setWeight: 50
        - pause: {duration: 15m}  # 메모리 누수 패턴 감지용
        - analysis:
            templates:
              - templateName: worker-error-rate
              - templateName: gpu-memory-check
            args:
              - name: service-name
                value: gpu-worker-canary

        # 80%에서 마지막 검증 후 자동 프로모션
        - setWeight: 80
        - pause: {duration: 10m}
        - analysis:
            templates:
              - templateName: worker-full-validation
            args:
              - name: service-name
                value: gpu-worker-canary

        # 최종 전환: 전체 트래픽을 새 버전으로 전환
        - setWeight: 100

      # 카나리 Pod을 GPU 노드 간 분산 배치
      # 특정 GPU 노드 장애가 카나리 전체에 영향주지 않도록 방지
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 100

      # 롤백 시 가용성 보장: 추가 Pod 1개 허용, 중단 Pod 0개
      maxSurge: 1
      maxUnavailable: 0

---
# AnalysisTemplate - GPU 헬스체크
# GPU 접근 가능 여부와 CUDA 연산 정상 동작 검증
# 카나리 1단계(5%)에서 기본 GPU 기능을 빠르게 확인
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: gpu-health-check
  namespace: gwp
spec:
  args:
    - name: service-name
  metrics:
    # GPU 사용 가능 여부 확인 (DCGM 메트릭 기반)
    - name: gpu-available
      interval: 60s     # 1분 간격으로 측정
      count: 3           # 3회 측정
      successCondition: result[0] == 1
      failureLimit: 1    # 1회 실패만 허용 (GPU 접근은 필수)
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            min(
              DCGM_FI_DEV_GPU_UTIL{
                pod=~"{{ args.service-name }}.*"
              } >= 0
            ) OR on() vector(0)

    # CUDA 에러 발생 여부 확인
    # 새 버전 배포 시 CUDA 호환성 문제를 즉시 감지
    - name: cuda-errors
      interval: 60s
      count: 3
      successCondition: result[0] == 0   # CUDA 에러는 0건이어야 함
      failureLimit: 0                     # CUDA 에러는 단 1회도 허용 불가
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(
              increase(
                gwp_worker_cuda_errors_total{
                  service="{{ args.service-name }}"
                }[5m]
              )
            ) OR on() vector(0)

---
# AnalysisTemplate - 워커 지연시간 검증
# GPU Job 지연시간이 SLA 기준 이내인지 확인
# 카나리 2단계(20%)에서 실제 트래픽 기반 성능 측정
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: worker-latency-check
  namespace: gwp
spec:
  args:
    - name: service-name
  metrics:
    # P99 지연시간 검증 (30초 이하)
    # GPU Job은 수 초~수십 초 소요되므로 30초 기준 적용
    - name: p99-latency
      interval: 120s    # 2분 간격으로 충분한 요청 데이터 수집
      count: 5
      successCondition: result[0] < 30   # P99 < 30초 (SLA 기준)
      failureLimit: 2    # 5회 중 2회까지 실패 허용 (일시적 스파이크 감안)
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(
                gwp_worker_request_duration_seconds_bucket{
                  service="{{ args.service-name }}"
                }[5m]
              )) by (le)
            )

    # P50 지연시간 검증 (10초 이하)
    # 중간값으로 전반적인 응답 성능 상태 확인
    - name: p50-latency
      interval: 120s
      count: 5
      successCondition: result[0] < 10   # P50 < 10초
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            histogram_quantile(0.50,
              sum(rate(
                gwp_worker_request_duration_seconds_bucket{
                  service="{{ args.service-name }}"
                }[5m]
              )) by (le)
            )

---
# AnalysisTemplate - GPU 활용도 검증
# GPU 리소스가 적절히 사용되는지 확인 (유휴/과부하 감지)
# 카나리 2단계(20%)에서 GPU 워크로드 분배 상태 확인
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: gpu-utilization-check
  namespace: gwp
spec:
  args:
    - name: service-name
  metrics:
    # GPU 활용률 정상 범위 확인 (5%~95%)
    # 5% 미만: GPU에 작업이 도달하지 않음 (라우팅 문제 의심)
    # 95% 초과: GPU 포화 상태 (성능 저하 및 OOM 위험)
    - name: gpu-utilization-healthy
      interval: 120s
      count: 5
      successCondition: result[0] > 5 && result[0] < 95
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            avg(
              DCGM_FI_DEV_GPU_UTIL{
                pod=~"{{ args.service-name }}.*"
              }
            )

    # GPU 온도 안전 범위 확인 (85도 미만)
    # 85도 초과 시 서멀 스로틀링으로 성능 급감 가능
    - name: gpu-temperature-safe
      interval: 120s
      count: 5
      successCondition: result[0] < 85  # 85도 이상이면 서멀 스로틀링 발생
      failureLimit: 1                    # 온도 문제는 즉시 대응 필요
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            max(
              DCGM_FI_DEV_GPU_TEMP{
                pod=~"{{ args.service-name }}.*"
              }
            )

---
# AnalysisTemplate - GPU 메모리 검증
# GPU 메모리 사용량 및 메모리 누수 감지
# 카나리 3단계(50%)에서 지속적인 부하 하에 메모리 안정성 확인
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: gpu-memory-check
  namespace: gwp
spec:
  args:
    - name: service-name
  metrics:
    # GPU 메모리 사용률 확인 (90% 미만)
    # 90% 초과 시 새 모델 로딩 공간 부족으로 OOM 위험
    - name: gpu-memory-usage-percent
      interval: 120s
      count: 5
      successCondition: result[0] < 90  # 10% 여유 공간 확보
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            avg(
              DCGM_FI_DEV_FB_USED{pod=~"{{ args.service-name }}.*"} /
              (DCGM_FI_DEV_FB_USED{pod=~"{{ args.service-name }}.*"} + DCGM_FI_DEV_FB_FREE{pod=~"{{ args.service-name }}.*"})
            ) * 100

    # GPU 메모리 누수 감지 (분당 증가율 1% 미만)
    # 10분 윈도우의 기울기(deriv)로 지속적 증가 패턴 탐지
    # 메모리 누수는 배포 직후보다 장시간 운영 후 나타나므로
    # 300초(5분) 간격으로 장기 추세 관찰
    - name: gpu-memory-leak-detection
      interval: 300s    # 5분 간격으로 장기 추세 관찰
      count: 3
      successCondition: result[0] < 1   # 분당 증가율 1% 미만
      failureLimit: 1                    # 누수 징후는 1회만 허용
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            deriv(
              avg(
                DCGM_FI_DEV_FB_USED{pod=~"{{ args.service-name }}.*"}
              )[10m:]
            ) * 60

---
# AnalysisTemplate - 워커 에러율 검증
# 애플리케이션 수준의 HTTP 5xx 에러율 모니터링
# 카나리 3단계(50%)에서 절반 트래픽 처리 시 에러율 확인
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: worker-error-rate
  namespace: gwp
spec:
  args:
    - name: service-name
  metrics:
    # 에러율 1% 미만 유지 필수
    # 5xx 응답 비율로 서버 측 장애 감지
    # 1%는 SLO 기준이며, 초과 시 사용자 경험에 유의미한 영향
    - name: error-rate
      interval: 120s
      count: 5
      successCondition: result[0] < 0.01  # 에러율 1% 미만 (SLO 기준)
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(rate(
              gwp_worker_requests_total{
                service="{{ args.service-name }}",
                status=~"5.."
              }[5m]
            )) /
            sum(rate(
              gwp_worker_requests_total{
                service="{{ args.service-name }}"
              }[5m]
            ))

---
# AnalysisTemplate - 종합 검증 (완전 전환 전 최종 게이트)
# 카나리 4단계(80%)에서 프로모션 전 모든 핵심 지표 종합 확인
# GPU Job 성공률과 Pod 안정성을 동시에 검증
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: worker-full-validation
  namespace: gwp
spec:
  args:
    - name: service-name
  metrics:
    # GPU Job 성공률 95% 이상 필수
    # GPU 워크로드는 핵심 비즈니스 기능이므로 높은 성공률 요구
    # 15분 윈도우로 충분한 샘플 확보
    - name: optimization-success-rate
      interval: 300s    # 5분 간격으로 장기 추세 확인
      count: 3
      successCondition: result[0] > 0.95  # 성공률 95% 이상
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(rate(
              gwp_worker_job_completed_total{
                service="{{ args.service-name }}",
                status="success"
              }[15m]
            )) /
            sum(rate(
              gwp_worker_job_completed_total{
                service="{{ args.service-name }}"
              }[15m]
            ))

    # Pod 재시작 횟수 0회 필수
    # 재시작은 OOM, CUDA 에러, 비정상 종료를 의미하므로 절대 불허
    - name: pod-restart-count
      interval: 300s
      count: 3
      successCondition: result[0] == 0   # 재시작 0회
      failureLimit: 0                     # 재시작 발생 시 즉시 롤백
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(
              increase(
                kube_pod_container_status_restarts_total{
                  pod=~"{{ args.service-name }}.*",
                  namespace="gwp-production"
                }[15m]
              )
            )
