# GPU 노드 / 워커 알림 규칙.
# orchestrator-api 자체 알림은 infrastructure/observability/prometheus-rules/orchestrator-slo.yaml 에 분리.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gwp-worker-alerts
  namespace: gwp
  labels:
    app.kubernetes.io/part-of: gwp
    prometheus: kube-prometheus
spec:
  groups:
    - name: gpu-health
      rules:
        - alert: GPUNodeDown
          expr: up{job="dcgm-exporter"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "GPU 노드 {{ $labels.instance }} 응답 없음"
            runbook_url: "https://github.com/ssa1004/gpu-job-orchestrator/blob/main/docs/runbooks/gpu-oom.md"

        - alert: GPUTemperatureHigh
          # GPU 온도가 85°C를 5분 이상 초과하면 알림
          # 지속 과열 및 thermal throttling 위험 감지 목적
          expr: DCGM_FI_DEV_GPU_TEMP > 85
          for: 5m
          labels:
            severity: high
          annotations:
            summary: "GPU {{ $labels.gpu }} 온도 {{ $value }}°C"

        - alert: GPUMemoryPressure
          expr: (DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE)) > 0.9
          for: 5m
          labels:
            severity: high
          annotations:
            summary: "GPU {{ $labels.gpu }} 메모리 사용률 {{ $value | humanizePercentage }}"

        - alert: GPUXIDError
          # XID 에러는 하드웨어/드라이버 문제 징후
          expr: increase(DCGM_FI_DEV_XID_ERRORS[10m]) > 0
          for: 1m
          labels:
            severity: high
          annotations:
            summary: "GPU {{ $labels.gpu }} XID 에러 발생"

    - name: worker-slo
      rules:
        - alert: WorkerErrorRateHigh
          expr: |
            sum(rate(gwp_worker_requests_total{status=~"5.."}[5m]))
            / sum(rate(gwp_worker_requests_total[5m])) > 0.01
          for: 5m
          labels:
            severity: high
          annotations:
            summary: "워커 에러율 {{ $value | humanizePercentage }} (SLO: 1% 미만)"

        - alert: JobQueueBacklog
          expr: gwp_worker_job_queue_depth > 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Job 큐 적체 {{ $value }}건"

        - alert: JobDurationAbnormal
          # 최근 30분 기준 Job 처리시간 P95가 1800초(30분)를 초과하면 알림
          expr: |
            histogram_quantile(0.95,
              sum(rate(gwp_worker_job_duration_seconds_bucket[30m])) by (le)
            ) > 1800
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Job P95 소요시간 {{ $value | humanizeDuration }}"

    - name: infrastructure
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[1h]) > 3
          for: 5m
          labels:
            severity: high
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} 1시간 내 {{ $value }}회 재시작"

        - alert: PVCNearFull
          expr: |
            kubelet_volume_stats_used_bytes
            / kubelet_volume_stats_capacity_bytes > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} 사용률 {{ $value | humanizePercentage }}"
