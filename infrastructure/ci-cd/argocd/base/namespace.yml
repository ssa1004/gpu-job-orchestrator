# Namespace - GPU Workload Platform GPU 워커
# Pod Security Standards: baseline (GPU 워크로드는 NVIDIA device plugin이
# /dev/nvidia* 디바이스 접근을 위해 restricted보다 완화된 정책이 필요)
# overlay에서 환경별 네임스페이스 이름 재정의
apiVersion: v1
kind: Namespace
metadata:
  name: gwp
  labels:
    app.kubernetes.io/part-of: gwp
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# ResourceQuota - 네임스페이스 리소스 상한
# GPU 리소스 낭비 방지 및 멀티테넌트 환경에서 공정한 리소스 분배 보장
# overlay에서 환경별로 상한 조정 (staging: 축소, production: 확대)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gwp-quota
  namespace: gwp
  labels:
    app.kubernetes.io/part-of: gwp
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 64Gi
    requests.nvidia.com/gpu: "4"
    limits.cpu: "32"
    limits.memory: 128Gi
    limits.nvidia.com/gpu: "4"
    pods: "20"
