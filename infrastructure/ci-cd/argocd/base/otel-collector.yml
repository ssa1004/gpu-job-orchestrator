# OTel Collector - 트레이스 수집 후 Tempo로 전달
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: gwp
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

      # request_id, job_id 등 주요 속성을 리소스 레벨로 올려서
      # Tempo 검색에서 바로 필터 가능하게
      attributes:
        actions:
          - key: service.version
            from_attribute: ENGINE_VERSION
            action: upsert

    exporters:
      otlp/tempo:
        endpoint: tempo.monitoring:4317
        tls:
          insecure: true

      # 디버깅용 - 프로덕션에서는 제거
      # logging:
      #   loglevel: debug

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, attributes]
          exporters: [otlp/tempo]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: gwp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      # 모니터링 워크로드 우선순위: GPU 워크로드보다 낮음
      # 리소스 부족 시 GPU 작업에 리소스 양보
      priorityClassName: monitoring-low
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args: ["--config=/conf/config.yaml"]
          ports:
            - containerPort: 4317  # gRPC
            - containerPort: 4318  # HTTP
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: gwp
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
    - name: http
      port: 4318
