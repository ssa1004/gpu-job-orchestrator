# image:latest 금지. 재현성 / 롤백 안전성.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: image-tag-not-latest
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [gwp, gwp-jobs]
      validate:
        message: "image tag :latest 금지. 명시적 버전 태그 또는 digest 를 사용하세요."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
            =(initContainers):
              - image: "!*:latest"
