# orchestrator-api 가 사용하는 모든 시크릿을 ExternalSecret 으로 관리.
#
# AWS Secrets Manager 의 path:
#   gwp/orchestrator/db          { username, password }
#   gwp/orchestrator/callback    { secret }
#   gwp/orchestrator/oauth       { client_secret }
#
# 각 ExternalSecret 은 5분 주기로 sync. 운영자가 AWS 측 값을 변경하면 다음 sync 에 반영.

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchestrator-db
  namespace: gwp
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: orchestrator-api-secret
    creationPolicy: Owner
  data:
    - secretKey: db.user
      remoteRef:
        key: gwp/orchestrator/db
        property: username
    - secretKey: db.password
      remoteRef:
        key: gwp/orchestrator/db
        property: password

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchestrator-callback
  namespace: gwp
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: orchestrator-callback
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: gwp/orchestrator/callback
        property: secret

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchestrator-oauth
  namespace: gwp
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: orchestrator-oauth-secret
    creationPolicy: Owner
  data:
    - secretKey: client.secret
      remoteRef:
        key: gwp/orchestrator/oauth
        property: client_secret
