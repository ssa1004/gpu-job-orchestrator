# 가설: orchestrator-api Pod 1개를 강제 종료해도 PDB(minAvailable=1) + 2 replica 덕분에
# 클라이언트가 보는 다운타임은 0 이다.
#
# 검증 방법:
# - 이 실험 동안 K6 job-submit.js (200 RPS) 를 별도 터미널에서 실행
# - 5xx rate 가 0 으로 유지되어야 함
# - rolling 으로 새 Pod 가 뜨는 동안 일시적으로 latency 가 올라갈 수 있음 (수용 가능)
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: orchestrator-pod-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces: [gwp]
    labelSelectors:
      app.kubernetes.io/name: orchestrator-api
  scheduler:
    cron: "@every 60s"
  duration: "5m"   # 총 5분간 매 60초마다 한 Pod 씩 kill
