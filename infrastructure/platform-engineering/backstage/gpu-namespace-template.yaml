# Backstage Software Template — 개발팀이 Backstage portal 에서 신청하면 GitOps repo 에
# PR 이 자동 생성되고, 머지 후 Crossplane 이 namespace + 쿼터 + RBAC 를 프로비저닝.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gpu-namespace
  title: GPU Namespace 신청
  description: 새 팀이 GPU Job 을 실행할 namespace + 쿼터 + RBAC 를 self-service 로 받기
  tags:
    - gpu
    - namespace
    - self-service
spec:
  owner: group:platform
  type: infrastructure

  parameters:
    - title: 기본 정보
      required:
        - team
        - namespaceName
        - costCenter
      properties:
        team:
          title: 팀 이름
          type: string
          ui:autofocus: true
          ui:options:
            rows: 1
        namespaceName:
          title: Namespace 이름 (소문자, 대시 허용)
          type: string
          pattern: '^[a-z][a-z0-9-]{2,30}$'
          description: 'gwp-<team> 권장. 예: gwp-vision-team'
        costCenter:
          title: Cost Center 코드
          type: string
          description: '청구 분류 (FinOps 추적용)'

    - title: GPU 쿼터
      required:
        - maxGpus
        - maxConcurrentJobs
      properties:
        maxGpus:
          title: 최대 동시 GPU 수
          type: integer
          minimum: 1
          maximum: 64
          default: 4
        maxConcurrentJobs:
          title: 최대 동시 Job 수
          type: integer
          minimum: 1
          maximum: 1000
          default: 20
        gpuTypes:
          title: 사용 가능 GPU 타입
          type: array
          items:
            type: string
            enum: [t4, a10g, a100, h100]
          uniqueItems: true
          default: [t4, a10g]

    - title: 접근 권한
      required:
        - oidcGroups
      properties:
        oidcGroups:
          title: OIDC 그룹 (이 그룹의 사용자가 namespace 에 kubectl 접근 가능)
          type: array
          items:
            type: string
          minItems: 1
          description: '예: [team-vision-lead, team-vision-eng]'

  steps:
    - id: render
      name: 매니페스트 렌더링
      action: fetch:template
      input:
        url: ./content
        values:
          team: ${{ parameters.team }}
          namespaceName: ${{ parameters.namespaceName }}
          costCenter: ${{ parameters.costCenter }}
          maxGpus: ${{ parameters.maxGpus }}
          maxConcurrentJobs: ${{ parameters.maxConcurrentJobs }}
          gpuTypes: ${{ parameters.gpuTypes }}
          oidcGroups: ${{ parameters.oidcGroups }}

    - id: publish
      name: GitOps repo 에 PR 생성
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=gwp-gitops&owner=ssa1004
        branchName: feat/gpu-namespace-${{ parameters.namespaceName }}
        title: 'feat(infra): GPU namespace ${{ parameters.namespaceName }} 신청'
        description: |
          ## 신청 내용

          - 팀: ${{ parameters.team }}
          - Namespace: ${{ parameters.namespaceName }}
          - Cost Center: ${{ parameters.costCenter }}
          - GPU 쿼터: ${{ parameters.maxGpus }} (max), ${{ parameters.maxConcurrentJobs }} jobs
          - 사용 GPU 타입: ${{ parameters.gpuTypes }}
          - 접근 그룹: ${{ parameters.oidcGroups }}

          ## 검토 체크

          - [ ] 쿼터가 cost center 의 예산 안에 들어가는지
          - [ ] OIDC 그룹이 실제 존재하는지
          - [ ] 같은 팀의 다른 namespace 와 책임 중복 없는지

          머지 시 ArgoCD 가 5분 안에 자동 sync.
        targetBranchName: main

  output:
    links:
      - title: 생성된 Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
