# NVIDIA GPU л“ңлқјмқҙлІ„ + CUDA м„Өм№ҳ
# DCGM exporterлҠ” systemdлЎң лҸҢлҰј (k3s мһҘм•  мӢңм—җлҸ„ л©”нҠёлҰӯ мҲҳм§‘ к°ҖлҠҘ)
---
- name: GPU ліҖмҲҳ кІҖмҰқ
  ansible.builtin.assert:
    that:
      - cuda_version is defined
      - cuda_version in cuda_versions
      - gpu_type is defined
    fail_msg: >-
      Host {{ inventory_hostname }} must define cuda_version (one of
      {{ cuda_versions.keys() | list }}) and gpu_type.
  tags: [gpu, validation]

- name: CUDA м„Өм • нҢҢмғқ ліҖмҲҳ
  ansible.builtin.set_fact:
    _cuda_config: "{{ cuda_versions[cuda_version] }}"
    _driver_branch: "{{ cuda_versions[cuda_version].driver_branch }}"
    _toolkit_package: "{{ cuda_versions[cuda_version].toolkit_package }}"
  tags: [gpu]

- name: кё°мЎҙ л“ңлқјмқҙлІ„ нҷ•мқё
  ansible.builtin.command: nvidia-smi --query-gpu=driver_version --format=csv,noheader
  register: existing_driver
  changed_when: false
  failed_when: false
  tags: [gpu, validation]

- name: л“ңлқјмқҙлІ„ мғҒнғң м¶ңл Ҙ
  ansible.builtin.debug:
    msg: >-
      {% if existing_driver.rc == 0 %}
      кё°мЎҙ л“ңлқјмқҙлІ„: {{ existing_driver.stdout | trim }}, лӘ©н‘ң: {{ _driver_branch }}
      {% else %}
      л“ңлқјмқҙлІ„ м—ҶмқҢ. {{ _driver_branch }} м„Өм№ҳ мҳҲм •.
      {% endif %}
  tags: [gpu]

# nouveau л№„нҷңм„ұнҷ” - NVIDIA лҸ…м җ л“ңлқјмқҙлІ„мҷҖ м¶©лҸҢ
- name: nouveau лё”лһҷлҰ¬мҠӨнҠё
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      blacklist nouveau
      options nouveau modeset=0
    owner: root
    group: root
    mode: "0644"
  register: nouveau_blacklisted
  tags: [gpu, nouveau]

- name: initramfs мһ¬л№Ңл“ң (Debian)
  ansible.builtin.command: update-initramfs -u
  when:
    - nouveau_blacklisted.changed
    - ansible_os_family == 'Debian'
  tags: [gpu, nouveau]

- name: initramfs мһ¬л№Ңл“ң (RedHat)
  ansible.builtin.command: dracut --force
  when:
    - nouveau_blacklisted.changed
    - ansible_os_family == 'RedHat'
  tags: [gpu, nouveau]

# NVIDIA л“ңлқјмқҙлІ„
- name: NVIDIA CUDA м ҖмһҘмҶҢ л””мҠӨнҠёлЎң мӢқлі„мһҗ м„Өм •
  ansible.builtin.set_fact:
    _cuda_distro: "ubuntu{{ ansible_distribution_version | replace('.', '') }}"
  when: ansible_os_family == 'Debian'
  tags: [gpu, driver]

- name: NVIDIA л“ңлқјмқҙлІ„ м„Өм№ҳ (Debian)
  when: ansible_os_family == 'Debian'
  tags: [gpu, driver]
  block:
    - name: CUDA GPG нӮӨ лӢӨмҡҙлЎңл“ң
      ansible.builtin.get_url:
        url: "https://developer.download.nvidia.com/compute/cuda/repos/{{ _cuda_distro }}/x86_64/3bf863cc.pub"
        dest: /usr/share/keyrings/nvidia-cuda-archive-keyring.gpg
        mode: "0644"

    - name: CUDA м ҖмһҘмҶҢ м¶”к°Җ
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/nvidia-cuda-archive-keyring.gpg]
          https://developer.download.nvidia.com/compute/cuda/repos/{{ _cuda_distro }}/x86_64 /
        state: present
        filename: cuda-nvidia

    - name: л“ңлқјмқҙлІ„ м„Өм№ҳ
      ansible.builtin.apt:
        name: "nvidia-driver-{{ _driver_branch }}"
        state: present
        update_cache: true
      register: driver_install_debian

- name: NVIDIA л“ңлқјмқҙлІ„ м„Өм№ҳ (RedHat)
  when: ansible_os_family == 'RedHat'
  tags: [gpu, driver]
  block:
    - name: CUDA м ҖмһҘмҶҢ м¶”к°Җ
      ansible.builtin.yum_repository:
        name: cuda-rhel
        description: NVIDIA CUDA Repository
        baseurl: "https://developer.download.nvidia.com/compute/cuda/repos/rhel$releasever/x86_64/"
        gpgkey: "https://developer.download.nvidia.com/compute/cuda/repos/rhel$releasever/x86_64/D42D0685.pub"
        gpgcheck: true
        enabled: true

    - name: л“ңлқјмқҙлІ„ м„Өм№ҳ
      ansible.builtin.yum:
        name: "nvidia-driver-latest-dkms"
        state: present
      register: driver_install_redhat

# CUDA нҲҙнӮ· (нҢЁнӮӨм§ҖлӘ…мқҖ cuda_versions л§өм—җм„ң кІ°м •)
- name: CUDA нҲҙнӮ· (Debian)
  ansible.builtin.apt:
    name: "{{ _toolkit_package }}"
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'
  tags: [gpu, cuda]

- name: CUDA нҲҙнӮ· (RedHat)
  ansible.builtin.yum:
    name: "{{ _toolkit_package }}"
    state: present
  when: ansible_os_family == 'RedHat'
  tags: [gpu, cuda]

- name: CUDA нҷҳкІҪліҖмҲҳ
  ansible.builtin.copy:
    dest: /etc/profile.d/cuda.sh
    content: |
      export CUDA_HOME=/usr/local/cuda
      export PATH=$CUDA_HOME/bin:$PATH
      export LD_LIBRARY_PATH=$CUDA_HOME/lib64:$LD_LIBRARY_PATH
    owner: root
    group: root
    mode: "0644"
  tags: [gpu, cuda]

- name: CUDA лқјмқҙлёҢлҹ¬лҰ¬ кІҪлЎң
  ansible.builtin.copy:
    dest: /etc/ld.so.conf.d/cuda.conf
    content: |
      /usr/local/cuda/lib64
    owner: root
    group: root
    mode: "0644"
  notify: ldconfig мӢӨн–ү
  tags: [gpu, cuda]

# л“ңлқјмқҙлІ„ кІҖмҰқ
- name: м»Өл„җ лӘЁл“Ҳ лЎңл“ң
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - nvidia
    - nvidia_uvm     # CUDA unified memory
    - nvidia_modeset
  tags: [gpu, validation]

- name: nvidia-smi лҸҷмһ‘ нҷ•мқё
  ansible.builtin.command: nvidia-smi
  changed_when: false
  register: nvidia_smi_output
  retries: 3
  delay: 10
  until: nvidia_smi_output.rc == 0
  tags: [gpu, validation]

- name: GPU лӘ©лЎқ нҷ•мқё
  ansible.builtin.command: nvidia-smi --query-gpu=name --format=csv,noheader
  changed_when: false
  register: gpu_list
  tags: [gpu, validation]

- name: GPU мҲҳлҹү кІҖмҰқ
  ansible.builtin.assert:
    that:
      - gpu_list.stdout_lines | length == gpu_count | int
    fail_msg: >-
      Expected {{ gpu_count }} GPUs but detected {{ gpu_list.stdout_lines | length }}.
    success_msg: "{{ gpu_count }} GPUs OK"
  when: gpu_count is defined
  tags: [gpu, validation]

# DCGM Exporter - GPU л©”нҠёлҰӯ мҲҳм§‘ (нҸ¬нҠё 9400)
- name: DCGM Exporter м„Өм№ҳ
  when: dcgm_exporter_enabled | default(true)
  tags: [gpu, dcgm]
  block:
    - name: DCGM мқҙлҜём§Җ нғңк·ё кІ°м •
      ansible.builtin.set_fact:
        _dcgm_image_tag: "{{ dcgm_exporter_version }}-ubuntu{{ ansible_distribution_version }}"
      when: ansible_os_family == 'Debian'

    - name: DCGM мқҙлҜём§Җ нғңк·ё кІ°м • (RedHat -- Ubuntu 22.04 кё°л°ҳ мқҙлҜём§Җ мӮ¬мҡ©)
      ansible.builtin.set_fact:
        _dcgm_image_tag: "{{ dcgm_exporter_version }}-ubuntu22.04"
      when: ansible_os_family == 'RedHat'

    - name: DCGM мқҙлҜём§Җ н’Җ
      ansible.builtin.command: >
        docker pull nvcr.io/nvidia/k8s/dcgm-exporter:{{ _dcgm_image_tag }}
      changed_when: false

    - name: DCGM systemd м„ңл№„мҠӨ
      ansible.builtin.copy:
        dest: /etc/systemd/system/dcgm-exporter.service
        content: |
          [Unit]
          Description=NVIDIA DCGM Exporter
          After=docker.service
          Requires=docker.service

          [Service]
          Type=simple
          Restart=always
          RestartSec=10
          ExecStartPre=-/usr/bin/docker rm -f dcgm-exporter
          ExecStart=/usr/bin/docker run \
            --name dcgm-exporter \
            --gpus all \
            --cap-add SYS_ADMIN \
            -p {{ dcgm_exporter_port | default(9400) }}:9400 \
            nvcr.io/nvidia/k8s/dcgm-exporter:{{ _dcgm_image_tag }}
          ExecStop=/usr/bin/docker stop dcgm-exporter

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: "0644"
      notify: DCGM Exporter мһ¬мӢңмһ‘

    - name: DCGM мӢңмһ‘
      ansible.builtin.systemd:
        name: dcgm-exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: DCGM н—¬мҠӨмІҙнҒ¬
      ansible.builtin.uri:
        url: "http://localhost:{{ dcgm_exporter_port | default(9400) }}/metrics"
        return_content: true
      register: dcgm_health
      retries: 5
      delay: 10
      until: dcgm_health.status == 200
      failed_when: dcgm_health.status != 200

# GPU persistence лӘЁл“ң - л“ңлқјмқҙлІ„ мғҒмӢң лЎңл“ңлЎң м»Ён…Ңмқҙл„Ҳ мӢңмһ‘ мӢң м§Җм—° к°җмҶҢ
- name: persistence лӘЁл“ң нҷңм„ұнҷ”
  ansible.builtin.command: nvidia-smi -pm 1
  changed_when: false
  tags: [gpu, persistence]

- name: nvidia-persistenced м„ңл№„мҠӨ
  ansible.builtin.copy:
    dest: /etc/systemd/system/nvidia-persistenced.service
    content: |
      [Unit]
      Description=NVIDIA Persistence Daemon
      After=syslog.target

      [Service]
      Type=forking
      ExecStart=/usr/bin/nvidia-persistenced --user root
      ExecStopPost=/bin/rm -rf /var/run/nvidia-persistenced

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: "0644"
  tags: [gpu, persistence]

- name: persistenced мӢңмһ‘
  ansible.builtin.systemd:
    name: nvidia-persistenced
    enabled: true
    state: started
    daemon_reload: true
  tags: [gpu, persistence]

