# k3s 서비스 핸들러
---
- name: restart k3s
  ansible.builtin.systemd:
    name: k3s
    state: restarted
    daemon_reload: true
  when: k3s_role == 'server'

- name: restart k3s-agent
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
    daemon_reload: true
  when: k3s_role == 'agent'
