# 모니터링 스택 배포
---
- name: "Node Exporter 배포"
  hosts: monitoring_targets
  become: true
  gather_facts: true
  tags: [monitoring, node-exporter]

  tasks:
    - name: node_exporter 사용자 생성
      ansible.builtin.user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false
      tags: [monitoring, node-exporter]

    - name: Node Exporter 다운로드
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
        mode: "0644"
      tags: [monitoring, node-exporter]

    - name: Node Exporter 압축 해제
      ansible.builtin.unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: true
        creates: /tmp/node_exporter-1.7.0.linux-amd64/node_exporter
      tags: [monitoring, node-exporter]

    - name: 바이너리 설치
      ansible.builtin.copy:
        src: /tmp/node_exporter-1.7.0.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Node Exporter 재시작
      tags: [monitoring, node-exporter]

    - name: systemd 서비스 설정
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          Restart=always
          RestartSec=5
          ExecStart=/usr/local/bin/node_exporter \
            --collector.filesystem.mount-points-exclude="^/(sys|proc|dev|host|etc)($$|/)" \
            --collector.textfile.directory=/var/lib/node_exporter/textfile_collector \
            --web.listen-address=:9100

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: "0644"
      notify: Node Exporter 재시작
      tags: [monitoring, node-exporter]

    - name: textfile collector 디렉토리
      ansible.builtin.file:
        path: /var/lib/node_exporter/textfile_collector
        state: directory
        owner: node_exporter
        group: node_exporter
        mode: "0755"
      tags: [monitoring, node-exporter]

    - name: Node Exporter 시작
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true
      tags: [monitoring, node-exporter]

    - name: Node Exporter 헬스체크
      ansible.builtin.uri:
        url: http://localhost:9100/metrics
        return_content: false
      register: node_exporter_check
      retries: 5
      delay: 5
      until: node_exporter_check.status == 200
      tags: [monitoring, node-exporter, validation]

  handlers:
    - name: Node Exporter 재시작
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
        daemon_reload: true

- name: "Promtail 배포"
  hosts: monitoring_targets
  become: true
  gather_facts: false
  tags: [monitoring, promtail]

  tasks:
    - name: Promtail 설정 디렉토리 생성
      ansible.builtin.file:
        path: /opt/monitoring/promtail
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Promtail 설정
      ansible.builtin.copy:
        dest: /opt/monitoring/promtail/promtail-config.yml
        content: |
          server:
            http_listen_port: 9080

          positions:
            filename: /tmp/positions.yaml

          clients:
            - url: http://{{ hostvars[groups['infra_nodes'][0]].ansible_host }}:3100/loki/api/v1/push

          scrape_configs:
            - job_name: syslog
              static_configs:
                - targets: [localhost]
                  labels:
                    host: {{ inventory_hostname }}
                    job: syslog
                    __path__: /var/log/syslog

            - job_name: docker
              static_configs:
                - targets: [localhost]
                  labels:
                    host: {{ inventory_hostname }}
                    job: docker
                    __path__: /var/lib/docker/containers/**/*.log
        owner: root
        group: root
        mode: "0644"
      register: promtail_config

    - name: 기존 Promtail 컨테이너 확인
      ansible.builtin.command: docker inspect promtail
      register: promtail_exists
      changed_when: false
      failed_when: false

    - name: Promtail 컨테이너 제거 (설정 변경 시 재생성)
      ansible.builtin.command: docker rm -f promtail
      when:
        - promtail_exists.rc == 0
        - promtail_config.changed
      changed_when: true

    - name: Promtail 컨테이너 실행
      ansible.builtin.command: >
        docker run -d
        --name promtail
        --restart unless-stopped
        -v /var/log:/var/log:ro
        -v /var/lib/docker/containers:/var/lib/docker/containers:ro
        -v /opt/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
        grafana/promtail:{{ promtail_version }}
        -config.file=/etc/promtail/config.yml
      when: promtail_exists.rc != 0 or promtail_config.changed
      register: promtail_start
      changed_when: promtail_start.rc == 0

- name: "중앙 모니터링 스택"
  hosts: infra_nodes[0]
  become: true
  gather_facts: false
  tags: [monitoring, central]

  roles:
    - role: monitoring

- name: "DCGM exporter 검증"
  hosts: infra_nodes[0]
  become: true
  gather_facts: false
  tags: [monitoring, dcgm, validation]

  tasks:
    - name: DCGM exporter 접근 확인
      ansible.builtin.uri:
        url: "http://{{ hostvars[item].ansible_host }}:{{ dcgm_exporter_port | default(9400) }}/metrics"
        return_content: true
        timeout: 10
      register: dcgm_check
      loop: "{{ groups['gpu_nodes'] }}"
      failed_when: false
      tags: [monitoring, dcgm]

    - name: DCGM 상태 출력
      ansible.builtin.debug:
        msg: >-
          DCGM on {{ item.item }}:
          {{ (item.status | default(0) == 200) | ternary('REACHABLE', 'UNREACHABLE') }}
      loop: "{{ dcgm_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      tags: [monitoring, dcgm]

    - name: Prometheus 타겟 확인
      ansible.builtin.uri:
        url: "http://localhost:9090/api/v1/targets"
        return_content: true
      register: prometheus_targets
      retries: 5
      delay: 15
      until: prometheus_targets.status == 200
      tags: [monitoring, validation]

    - name: 배포 요약
      ansible.builtin.debug:
        msg:
          - "============================================="
          - " Monitoring Stack Deployment Complete"
          - "============================================="
          - ""
          - " Prometheus:  http://{{ ansible_host }}:9090"
          - " Grafana:     http://{{ ansible_host }}:3000"
          - " Loki:        http://{{ ansible_host }}:3100"
          - " Alertmanager: http://{{ ansible_host }}:9093"
          - ""
          - " GPU Dashboards: Grafana > GPU Workload Platform > GPU Overview"
          - " GPU Alerts:     Configured for temperature, memory, utilization"
          - "============================================="
      tags: [monitoring, validation]
