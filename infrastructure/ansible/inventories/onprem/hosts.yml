# GPU Workload Platform 온프레미스 인벤토리
# 토폴로지:
#   - gpu_nodes    : GPU 워크로드용 NVIDIA GPU 워커 노드
#   - control_plane: k3s 서버 노드 (리소스 허용 시 인프라 겸용 가능)
#   - infra_nodes  : Harbor 레지스트리, Nexus, 모니터링 서비스
all:
  children:
    # GPU 워커 노드
    # Kubernetes를 통해 GPU 워크로드를 실행.
    # 각 노드에는 1개 이상의 NVIDIA GPU(A100, A10, T4 등) 필요.
    gpu_nodes:
      hosts:
        gpu-node-01:
          ansible_host: 10.10.1.11
          gpu_type: a100
          gpu_count: 4
          cuda_version: "12.1"
        gpu-node-02:
          ansible_host: 10.10.1.12
          gpu_type: a100
          gpu_count: 4
          cuda_version: "12.1"
        gpu-node-03:
          ansible_host: 10.10.1.13
          gpu_type: t4
          gpu_count: 2
          # T4 노드는 특정 모델 호환성을 위해 구버전 CUDA가 필요할 수 있음
          cuda_version: "11.8"
      vars:
        # 모든 GPU 노드는 k3s 에이전트(워커)로 합류
        k3s_role: agent
        # 이 노드들의 모든 컨테이너에 NVIDIA 런타임 기본 활성화
        nvidia_runtime_default: true

    # Kubernetes 컨트롤 플레인
    # k3s 서버 노드 -- 경량 단일 바이너리 Kubernetes.
    control_plane:
      hosts:
        k3s-master-01:
          ansible_host: 10.10.1.1
          k3s_role: server
          # 첫 번째 서버가 클러스터를 초기화
          k3s_init: true
        k3s-master-02:
          ansible_host: 10.10.1.2
          k3s_role: server
        k3s-master-03:
          ansible_host: 10.10.1.3
          k3s_role: server
      vars:
        # 외부 의존 없이 HA를 위한 embedded etcd 사용
        k3s_datastore: "embedded-etcd"

    # 인프라 / 서비스 노드
    # Harbor 컨테이너 레지스트리, Nexus PyPI 캐시, 모니터링 스택 운영.
    infra_nodes:
      hosts:
        infra-01:
          ansible_host: 10.10.1.21
          harbor_role: primary
        infra-02:
          ansible_host: 10.10.1.22
          harbor_role: replica

    # 플레이북에서 사용하는 논리적 그룹
    k3s_cluster:
      children:
        control_plane:
        gpu_nodes:

    monitoring_targets:
      children:
        gpu_nodes:
        control_plane:
        infra_nodes:

  vars:
    ansible_user: gwp
    ansible_ssh_private_key_file: ~/.ssh/gwp_infra
    ansible_python_interpreter: /usr/bin/python3
