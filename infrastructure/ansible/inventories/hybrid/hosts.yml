# GPU Workload Platform 하이브리드 인벤토리
# 하이브리드 배포 구성:
#   - 온프레미스 GPU 노드: 지연 시간에 민감한 GPU 워크로드 실행
#   - 클라우드 노드: 탄력적 확장 및 부가 서비스 제공
#   - 공유 컨트롤 플레인: 양쪽 환경을 연결
#
# 적용 사례: 데이터 주권을 위해 온프레미스 GPU가 필요하면서도
# 학습이나 배치 추론에 클라우드 탄력성을 활용하려는 조직.
all:
  children:
    # 온프레미스 GPU 노드 (순수 온프레미스 배포와 동일)
    onprem:
      children:
        onprem_gpu_nodes:
          hosts:
            gpu-node-01:
              ansible_host: 10.10.1.11
              gpu_type: a100
              gpu_count: 4
              cuda_version: "12.1"
            gpu-node-02:
              ansible_host: 10.10.1.12
              gpu_type: a100
              gpu_count: 4
              cuda_version: "12.1"
          vars:
            k3s_role: agent
            nvidia_runtime_default: true
            node_location: onprem

        onprem_control_plane:
          hosts:
            k3s-master-01:
              ansible_host: 10.10.1.1
              k3s_role: server
              k3s_init: true
          vars:
            node_location: onprem

        onprem_infra:
          hosts:
            infra-01:
              ansible_host: 10.10.1.21
              harbor_role: primary
          vars:
            node_location: onprem

    # 클라우드 노드 (예: AWS, GCP, Azure GPU 인스턴스)
    cloud:
      children:
        cloud_gpu_nodes:
          hosts:
            cloud-gpu-01:
              ansible_host: cloud-gpu-01.gwp.cloud
              gpu_type: a10g
              gpu_count: 4
              cuda_version: "12.1"
              cloud_provider: aws
              instance_type: g5.12xlarge
            cloud-gpu-02:
              ansible_host: cloud-gpu-02.gwp.cloud
              gpu_type: a10g
              gpu_count: 4
              cuda_version: "12.1"
              cloud_provider: aws
              instance_type: g5.12xlarge
          vars:
            k3s_role: agent
            nvidia_runtime_default: true
            node_location: cloud
            # 클라우드 노드는 WireGuard VPN을 통해 온프레미스 k3s 클러스터에 합류
            k3s_vpn_enabled: true

        cloud_infra:
          hosts:
            cloud-infra-01:
              ansible_host: cloud-infra-01.gwp.cloud
              cloud_provider: aws
          vars:
            node_location: cloud

    # 양쪽 환경을 아우르는 논리적 그룹
    k3s_cluster:
      children:
        onprem_control_plane:
        onprem_gpu_nodes:
        cloud_gpu_nodes:

    all_gpu_nodes:
      children:
        onprem_gpu_nodes:
        cloud_gpu_nodes:

    # 플레이북 호환 그룹 -- site.yml, gpu-setup.yml, k8s-setup.yml,
    # monitoring.yml 에서 참조하는 표준 그룹명.
    gpu_nodes:
      children:
        onprem_gpu_nodes:
        cloud_gpu_nodes:

    control_plane:
      children:
        onprem_control_plane:

    infra_nodes:
      children:
        onprem_infra:
        cloud_infra:

    monitoring_targets:
      children:
        onprem_gpu_nodes:
        onprem_control_plane:
        onprem_infra:
        cloud_gpu_nodes:
        cloud_infra:

  vars:
    ansible_user: gwp
    ansible_ssh_private_key_file: ~/.ssh/gwp_infra
    ansible_python_interpreter: /usr/bin/python3
    # 하이브리드 전용: 사이트 간 네트워킹 활성화
    wireguard_enabled: true
    wireguard_port: 51820
    wireguard_network: "10.99.0.0/24"
