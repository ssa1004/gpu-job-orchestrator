# GPU Workload Platform 온프레미스 Ansible 설정
[defaults]
inventory         = inventories/onprem/hosts.yml
roles_path        = roles
collections_paths = collections

# GPU 노드 작업이 무거워서 forks 높게
forks             = 20

gathering         = smart
fact_caching      = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout    = 3600

# 대상 호스트 sudoers에서 requiretty 꺼야 함
pipelining        = True

retry_files_enabled = True
retry_files_save_path = /tmp/ansible_retries

stdout_callback   = yaml
callbacks_enabled = timer, profile_tasks

vault_password_file = ~/.ansible/vault_password

log_path          = /var/log/ansible/ansible.log

# 초기 프로비저닝 시 False, 운영 환경에서는 True 권장
host_key_checking = False

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o ServerAliveInterval=30
# GPU 드라이버 다운로드 때문에 넉넉하게
timeout  = 120

[persistent_connection]
connect_timeout = 60
command_timeout = 120
