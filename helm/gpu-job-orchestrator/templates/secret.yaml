{{- if not .Values.postgres.existingSecret }}
# DB 자격증명 — postgres.existingSecret 가 비어 있을 때만 chart 가 직접 Secret 을 생성.
# 운영에서는 보통 ExternalSecrets / SealedSecrets 같은 별도 도구가 만든 Secret 을
# existingSecret 으로 바인딩 — 평문이 values 에 박히지 않게.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gpu-job-orchestrator.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-job-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  db.user: {{ .Values.postgres.user | quote }}
  # password 가 비어 있으면 Spring 이 빈 문자열로 시도 → 즉시 실패. 의도된 동작
  # (잘못된 배포를 빨리 깨뜨려 알게).
  db.password: {{ default "" .Values.postgres.password | quote }}
{{- end }}
{{- if not .Values.callback.existingSecret }}
---
# 콜백 HMAC shared secret — 워커 Pod 의 env 와 같은 값이어야 검증 통과.
# KubernetesJobDispatcher 가 워커 Pod 띄울 때 valueFrom.secretKeyRef 로 같은 Secret 을
# 참조시키면 평문이 envvar 로 노출되지 않는다 (Batch 7 / M2).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gpu-job-orchestrator.fullname" . }}-callback
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-job-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  callback.secret: {{ .Values.callback.secret | quote }}
{{- end }}
