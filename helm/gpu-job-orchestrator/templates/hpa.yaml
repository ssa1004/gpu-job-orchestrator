{{- if .Values.autoscaling.enabled -}}
# HPA — CPU / memory 사용률 기반.
# Deployment.replicas 는 비워 둠 (template 안에서 if not autoscaling 으로 분기) —
# 안 그러면 HPA 가 올린 replica 를 helm upgrade 가 다시 줄여 churn 발생.
#
# autoscaling/v2 사용 (v1 은 CPU 만 지원). 메모리 burst 도 같이 보면 spike 잡기 좋음.
# burst 가 많은 워크로드라면 KEDA scaledObject (Kafka lag 등) 로 교체 검토.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "gpu-job-orchestrator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-job-orchestrator.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "gpu-job-orchestrator.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- with .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
{{- end }}
