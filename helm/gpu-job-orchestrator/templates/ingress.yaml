{{- if .Values.ingress.enabled -}}
{{- $fullName := include "gpu-job-orchestrator.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
# 외부 노출 — 실제 구현된 controller 경로만 (values.yaml 의 ingress.hosts.paths).
# /internal/* 는 워커 → orchestrator 의 클러스터 내부 콜백이라 외부에 노출되면 위험 →
# values-prod.yaml 의 nginx server-snippet annotation 으로 ingress 단에서 차단.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-job-orchestrator.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
