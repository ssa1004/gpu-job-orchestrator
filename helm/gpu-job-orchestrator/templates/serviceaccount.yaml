{{- if .Values.serviceAccount.create -}}
# orchestrator-api 의 워크로드 identity.
# RoleBinding 두 개가 이 SA 를 가리킨다 — Job 생성 권한 + Lease 권한.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gpu-job-orchestrator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-job-orchestrator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
