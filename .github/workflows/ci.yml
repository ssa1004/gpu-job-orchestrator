# ci — 빌드 / 테스트. CodeQL(codeql.yml)은 보안 정적분석, 본 워크플로우는 기능 검증 담당.
#
# 이 레포는 두 개의 독립 빌드 단위로 나뉜다:
#   - orchestrator-api : Gradle 단일 프로젝트 (Kotlin, JDK 17). production 코드 100% Kotlin.
#   - worker           : Go 모듈 (go 1.22).
#
# 현재 본 ci 는 orchestrator-api 빌드/테스트 + 통합 compose lint 만 검증한다.
# worker 빌드 job 은 의도적으로 아직 넣지 않았다 — worker/go.sum 이 커밋되어 있지 않아
# CI 의 깨끗한 환경에서 `go build` 가 모듈 해시 검증에 실패한다. go.sum 을 커밋한 뒤
# (`cd worker && go mod download && go mod verify` → go.sum 생성) 아래 형태의 job 을 붙이면
# 된다 (참고로 worker 정적 보안분석은 codeql.yml 의 go 매트릭스가 이미 커버):
#   worker:
#     steps:
#       - uses: actions/setup-go@v5  with: { go-version: "1.22", cache-dependency-path: worker/go.sum }
#       - run: go build ./... && go vet ./... && go test ./...   # working-directory: worker
#
# release / load-test 워크플로우는 infrastructure/ci-cd/github-actions/ 아래 참고용 스냅샷이며,
# 실제로 PR 마다 도는 것은 본 ci.yml 과 codeql.yml 둘이다.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 PR 에 새 푸시가 오면 이전 run 을 즉시 취소 (CI 시간/요금 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  orchestrator-api:
    name: Build orchestrator-api (Gradle)
    runs-on: ubuntu-latest
    # main push 일 때만 갱신한 커버리지 badge SVG 를 커밋하기 위한 권한. PR 빌드는
    # 요약만 보여주고 커밋하지 않으므로 fork PR 에서 권한이 새어 나가지 않는다.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: "17"
          distribution: temurin
      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
      - name: Build & test
        working-directory: orchestrator-api
        # check 는 build 의 부분집합이지만 명시 — 새로운 verification task 가 추가되면
        # build 가 자동 포함하지 않을 수 있음. JobLifecycleIT 는 Testcontainers(Postgres)를
        # 띄우는데, GitHub ubuntu-latest 러너에는 Docker 가 있어 그대로 동작한다.
        # test 가 finalizedBy(jacocoTestReport) 라 커버리지 CSV / XML / HTML 도 함께 생성된다.
        run: ./gradlew build check jacocoTestReport --no-daemon
      - name: Coverage badge (JaCoCo)
        # JaCoCo CSV 를 파싱해 커버리지 % 를 step summary 와 badges/jacoco.svg 로 떨군다.
        # README 의 coverage badge 가 main 브랜치의 이 SVG 를 가리킨다.
        uses: cicirello/jacoco-badge-generator@72266185b7ee48a6fd74eaf0238395cc8b14fef8 # v2.12.1
        with:
          jacoco-csv-file: orchestrator-api/build/reports/jacoco/test/jacocoTestReport.csv
          generate-coverage-badge: true
          badges-directory: badges
          generate-summary: true
      - name: Commit coverage badge
        # main 으로의 push 일 때만 갱신된 badge 를 되커밋. [skip ci] 로 재귀 트리거 방지.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [[ -n "$(git status --porcelain badges/jacoco.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add badges/jacoco.svg
            git commit -m "chore(ci): update coverage badge [skip ci]"
            git push
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-orchestrator-api
          path: orchestrator-api/build/reports/jacoco/test/html/
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report-orchestrator-api
          path: orchestrator-api/build/reports/tests/

  lint-compose:
    name: Validate integration compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: docker compose config
        run: docker compose -f infrastructure/docker/docker-compose.integration.yml config > /dev/null

  # GitHub Actions 워크플로우 자체의 정적 검증. SHA 핀 / 표현식 / shell 오타를
  # PR 단계에서 잡는다. actionlint 는 내부적으로 shellcheck 도 호출한다.
  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run actionlint
        # 버전 핀 — 컨테이너 이미지 다이제스트까지는 아니지만 부동 latest 회피.
        run: |
          docker run --rm -v "$PWD:/repo" --workdir /repo \
            rhysd/actionlint:1.7.7 -color .github/workflows/*.yml

  # IaC(Helm) 를 active CI 에서 검증한다. 기존엔 chart 가 CI 게이트 밖에 있어
  # 템플릿이 깨져도 머지가 통과했음. dev(values.yaml) + prod(values-prod.yaml)
  # 양쪽을 helm lint + helm template | kubeconform 으로 검사한다.
  iac-validate:
    name: Validate Helm chart (lint + kubeconform)
    runs-on: ubuntu-latest
    env:
      CHART: helm/gpu-job-orchestrator
      KUBECONFORM_VERSION: "0.6.7"
      # ServiceMonitor 같은 CRD 는 K8s 기본 스키마에 없어 datreeio CRD 카탈로그로 보강.
      CRD_SCHEMA: "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.19.0
      - name: Install kubeconform
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v
      - name: helm lint (dev + prod)
        run: |
          helm lint "$CHART"
          helm lint "$CHART" -f "$CHART/values-prod.yaml"
      - name: helm template | kubeconform (dev)
        run: |
          helm template t "$CHART" \
            | kubeconform -strict -ignore-missing-schemas -summary \
                -schema-location default \
                -schema-location "$CRD_SCHEMA"
      - name: helm template | kubeconform (prod)
        run: |
          helm template t "$CHART" -f "$CHART/values-prod.yaml" \
            | kubeconform -strict -ignore-missing-schemas -summary \
                -schema-location default \
                -schema-location "$CRD_SCHEMA"

  # Terraform(IaC) 를 active CI 에서 검증한다. 기존엔 infrastructure/terraform 이
  # CI 게이트 밖에 있어 fmt 흐트러짐이나 모듈/리소스 정의 오류가 머지를 통과했음.
  # fmt -check 로 포맷을 강제하고, 각 환경(cloud/hybrid/onprem)을
  # init -backend=false + validate 로 검사한다. -backend=false 라 백엔드/클라우드
  # 자격증명 없이도 모듈 그래프와 리소스/변수 정의가 검증된다.
  terraform-validate:
    name: Validate Terraform (fmt + validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.8"
      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive infrastructure/terraform
      - name: Validate each environment
        # 환경별로 init -backend=false 후 validate. 하나라도 실패하면 job 실패.
        run: |
          for env in cloud hybrid onprem; do
            echo "::group::terraform validate ($env)"
            terraform -chdir="infrastructure/terraform/environments/$env" init -backend=false -input=false
            terraform -chdir="infrastructure/terraform/environments/$env" validate
            echo "::endgroup::"
          done

  # Kyverno ClusterPolicy 를 'kyverno test' 로 검증한다. good 리소스는 통과,
  # bad 리소스는 차단되어야 한다는 기대 결과를 fixtures 에 박아두고, 정책이
  # 의도대로 동작하는지를 PR 단계에서 잡는다(verifyImages 기반 image-signature
  # 정책은 레지스트리/서명 검증이 필요해 오프라인 CLI 테스트에서 제외).
  kyverno-test:
    name: Test Kyverno policies (kyverno test)
    runs-on: ubuntu-latest
    env:
      KYVERNO_VERSION: "1.18.1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install kyverno CLI
        run: |
          curl -fsSL -o kyverno-cli.tar.gz \
            "https://github.com/kyverno/kyverno/releases/download/v${KYVERNO_VERSION}/kyverno-cli_v${KYVERNO_VERSION}_linux_x86_64.tar.gz"
          tar -xzf kyverno-cli.tar.gz kyverno
          sudo install -m 0755 kyverno /usr/local/bin/kyverno
          kyverno version
      - name: Run kyverno test
        run: kyverno test infrastructure/security/kyverno
