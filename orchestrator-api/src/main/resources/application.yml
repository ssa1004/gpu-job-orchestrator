spring:
  application:
    name: orchestrator-api
  data:
    # Spring Data Web 의 Pageable resolver 안전 상한. /api/v1/jobs?size=10000 같은 큰
    # page 요청을 자동으로 max-page-size 로 clamp — API4 (Unrestricted Resource
    # Consumption) 의 DB 부하 폭증 / 응답 크기 폭증 방어. one-page-fits-all 가 아니라
    # 운영 상한 — 더 많은 데이터가 필요하면 페이지를 넘기는 게 정상 흐름.
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
  datasource:
    url: jdbc:h2:mem:orchestrator;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple   # 로컬 dev: in-memory ConcurrentMapCacheManager
  kafka:
    # autoconfigure 가 동작하려면 bootstrap-servers 가 있어야 함. 로컬에선 미사용 (publisher 가 noop)
    bootstrap-servers: ${KAFKA_BOOTSTRAP:}
    producer:
      acks: all
      retries: 5
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
  lifecycle:
    # K8s default 30s - preStop sleep 5s - JVM exit 여유 1s = 24s.
    # 이 안에 in-flight HTTP 요청이 응답되고, 안 끝난 요청은 강제 종료 (5xx).
    # 너무 길게 잡으면 SIGKILL 까지 가서 connection reset; 너무 짧으면 정상 끝나려던
    # 요청까지 잘림. 25s 가 평균 RPS 와 max latency 분포 기준 합리적 trade-off. ADR-0024.
    timeout-per-shutdown-phase: 25s

server:
  port: 8080
  # SIGTERM 수신 시 새 요청 거절 + in-flight 요청은 timeout-per-shutdown-phase 만큼
  # 처리 후 응답. K8s default terminationGracePeriodSeconds 30s 안에 다 끝나야 한다 —
  # ADR-0024 의 단계별 흐름 참고.
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        # Spring Boot 3 의 K8s probe 자동 wiring — /actuator/health/liveness 와
        # /actuator/health/readiness 두 endpoint 를 분리해서 노출. 이 둘이 K8s
        # livenessProbe / readinessProbe 의 표적. ADR-0023 참고.
        enabled: true
        # K8s 가 아닌 환경 (로컬 dev) 에서도 동일하게 동작 — 별 비용 없음.
        add-additional-paths: false
      show-details: when-authorized
    # ApplicationAvailability API 의 LivenessState / ReadinessState 를 health
    # group 으로 자동 매핑. probes.enabled=true 가 켜져 있으면 Spring Boot 3 가
    # 알아서 group 'liveness' / 'readiness' 를 생성한다.
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: false   # 로컬 zero-infra: Redis 미사용이라 health probe 끔 — 집계 /actuator/health 503 방지
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # Timer 들에 percentile-histogram 활성 → bucket 으로 export → Prometheus exemplar
      # 가 bucket 마다 trace_id 를 attach 가능 (ADR-0019). 개별 timer 는 코드에서
      # publishPercentileHistogram() / serviceLevelObjectives(...) 로 SLO bucket 명시.
      percentiles-histogram:
        gwp_orchestrator_job_submit_seconds: true
        gwp_orchestrator_dispatch_latency_seconds: true
  tracing:
    sampling:
      probability: 1.0
    # W3C Trace Context (RFC 9.5) — Kafka header / HTTP header 모두 같은 표준 포맷.
    # ADR-0018 참고. B3 (Zipkin 호환) 도 같이 켜면 legacy consumer 까지 호환되지만,
    # 이 시스템은 신규라 W3C 단일 포맷으로 통일 — 헤더 양 절반.
    propagation:
      type: w3c
    # Baggage 자동 propagation (RFC 9.5.3 의 'baggage' 헤더) — JobBaggage.ALLOWED 화이트리스트의
    # 키만 자동으로 inbound HTTP header / outbound HTTP / Kafka 로 흐른다. ADR-0021 참고.
    # remote-fields: trace 가 *옆 서비스* 에서 흘러올 때 그 서비스가 박은 baggage 중 받을 키.
    # correlation-fields: 받은 baggage 중 MDC 에 자동 미러링할 키 (로그 라인 라벨에 박힘).
    # tag-fields: span tag 로도 동시 노출 — Tempo / Jaeger UI 에서 검색 가능.
    baggage:
      remote-fields:
        - owner
        - cost-center
        - priority
      correlation:
        enabled: true
        fields:
          - owner
          - cost-center
          - priority
      tag-fields:
        - owner
        - cost-center
        - priority
  prometheus:
    metrics:
      export:
        # Prometheus 스크레이프 응답 (/actuator/prometheus) 에 histogram bucket 별 exemplar
        # 가 OpenMetrics 포맷으로 함께 노출되도록. Spring Boot 3.3 가 Tracer 빈이 있으면
        # 자동으로 SpanContext 를 만들어 PrometheusMeterRegistry 에 wiring.
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs
  # spec 의 schema property / map 키를 알파벳 순으로 직렬화. springdoc 가 schema 를
  # reflection 으로 만들 때 property 순서가 JVM run 마다 달라질 수 있어, 정렬을 강제해야
  # /v3/api-docs.yaml 출력이 결정적이 된다. ci.yml 의 OpenAPI drift gate 가 git diff
  # 로 비교하므로 이 옵션이 없으면 코드 변경 없이도 gate 가 spurious 하게 실패한다.
  writer-with-order-by-keys: true

gwp:
  kubernetes:
    enabled: false
    namespace: gwp-jobs
    job-ttl-seconds: 86400
    callback-url: http://orchestrator-api.gwp.svc.cluster.local:8080/internal/jobs
  storage:
    enabled: false
    presign-ttl-seconds: 3600
  callback:
    shared-secret: ${GWP_CALLBACK_SECRET:dev-secret-change-me}
  security:
    jwt:
      enabled: false   # 로컬 dev: PermissiveSecurityConfig 활성. 운영에서 true.
  outbox:
    relay:
      # 로컬 dev 는 Kafka 미연결이라 relay 자체를 끔 (false). 운영에서 true.
      # ShedLock 으로 다중 인스턴스 안전성 확보 — 같은 시각에 한 인스턴스만 polling.
      enabled: false
      poll-interval-ms: 1000   # tick 주기 — 이벤트 발생 후 발행까지 평균 0.5초 lag
      batch-size: 100          # 한 tick 에 처리할 메시지 수
      send-timeout-ms: 5000    # Kafka send 응답 대기 — 이걸 초과하면 실패 처리
      topic-prefix: "gwp."     # 토픽: gwp.{aggregateType}.{eventType} (예: gwp.job.submitted)
      max-attempts: 10         # 이 횟수 초과 시 메시지를 DLQ 로 격리 (poison pill 방어)
  quota:
    default-max-concurrent-jobs: 10
    default-max-gpu-count: 16
    advisory-lock-enabled: false   # H2 dev: 단일 인스턴스라 race 없음. prod 에서 true.
  leader:
    # 다중 인스턴스 leader election 모드:
    #   shedlock — ShedLock @SchedulerLock 만으로 직렬화 (DB row 락). H2/dev 기본.
    #   lease    — K8s coordination.k8s.io/Lease 사용. prod 권장.
    # 비-리더 인스턴스는 스케줄러 진입을 즉시 return — 락 경쟁 비용도 안 듦.
    mode: shedlock
    namespace: gwp
    lease-name: gwp-orchestrator-leader
    # K8s Downward API 로 metadata.name 을 환경변수에 주입해 채우는 게 운영 컨벤션.
    # 누락 시 hostname 으로 fallback (KubernetesLeaseLeaderElector 가 처리).
    identity: ${POD_NAME:}
    # kube-controller-manager 표준 비율 (15s / 10s / 2s) — network blip 흡수와 takeover
    # 속도의 트레이드오프. 너무 짧으면 churn (잦은 전환), 너무 길면 SLA 영향.
    lease-duration-seconds: 15
    renew-deadline-seconds: 10
    retry-period-seconds: 2

logging:
  pattern:
    # MDC 키들이 모든 로그 라인에 박힘 — owner / cost-center 는 baggage 에서 자동 미러링
    # 되어 cross-system 로그 검색이 자동 가능 (ADR-0021).
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{requestId:-},owner=%X{owner:-},cc=%X{cost-center:-}]"

resilience4j:
  circuitbreaker:
    # 회로 (circuit) 의 3 상태 — 상태 머신:
    #   CLOSED    → 정상. 모든 호출 통과. 실패 / slow 비율 집계.
    #   OPEN      → 장애 감지. 호출 즉시 fast-fail (CallNotPermittedException).
    #   HALF_OPEN → 복구 시도 중. 일부 호출만 허용해서 결과 보고 CLOSED / OPEN 결정.
    #
    # 전이 조건:
    #   CLOSED → OPEN     : sliding-window 안의 failure-rate 또는 slow-call-rate 가 임계 초과.
    #   OPEN → HALF_OPEN  : wait-duration-in-open-state 만큼 기다린 뒤 자동 전이.
    #   HALF_OPEN → CLOSED: 허용된 호출 (permitted-number-of-calls-in-half-open-state) 이 대부분 성공.
    #   HALF_OPEN → OPEN  : 허용된 호출 중 임계 초과 실패.
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20             # 최근 20번 호출의 결과로 집계
        minimum-number-of-calls: 10         # 최소 표본 — 호출 수가 적으면 비율 계산 의미 X
        failure-rate-threshold: 50          # %  — 50% 이상 실패하면 OPEN
        slow-call-rate-threshold: 50        # %  — 50% 이상 느리면 OPEN
        slow-call-duration-threshold: 5s    # 이보다 느린 호출은 slow 로 카운트
        wait-duration-in-open-state: 30s    # OPEN 상태 유지 시간 — 그 사이 호출은 fast-fail
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      kafka:
        # Kafka broker 호출용. broker 가 죽었을 때 OutboxRelay 가 send_timeout 5초씩 hang
        # 하는 대신 즉시 fail → 한 tick 이 빠르게 끝나고 attempt 카운터만 1씩 증가.
        base-config: default
      k8s:
        # K8s API 호출용. dispatch / cancel 등 — 응답이 종종 느려 slow 임계 ↑.
        base-config: default
        slow-call-duration-threshold: 10s
  retry:
    # Retry 와 CircuitBreaker 가 같은 호출에 같이 붙으면 *순서* 가 중요하다.
    # decorator chain 은 바깥쪽이 먼저 실행 — Retry 가 CircuitBreaker 를 감싸야
    # *retry 시도마다* CircuitBreaker 안에서 실행되어 OPEN 으로 떨어졌을 때 다음 retry
    # 가 fast-fail 로 즉시 떨어진다. 반대 순서면 retry 가 hang 상태에서 끝까지 attempts
    # 만큼 시도하다가 결국 OPEN 신호조차 못 받음. ADR-0025 참고.
    configs:
      default:
        # exponential backoff with full jitter (AWS architecture blog 2015) —
        # backoff = random(0, base * 2^attempt). 100 Pod 가 동시에 503 을 받아도
        # retry 시점이 0~waitDuration*2^n 구간에 균일 분포로 흩어져 thundering herd
        # 방지. randomized-wait-factor 가 0.5 이면 ±50% 변동.
        max-attempts: 4
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        randomized-wait-factor: 0.5
        # KubernetesClientException 만 retry 대상. 4xx (clientside) 는 retry 해도
        # 같은 결과 — predicate 로 거른다 (RetryableExceptionPredicate 참고).
        retry-exceptions:
          - io.fabric8.kubernetes.client.KubernetesClientException
          - org.apache.kafka.common.errors.RetriableException
        # Resilience4j 가 retry 시도마다 호출하는 predicate — 4xx 같은 영구 실패는
        # 즉시 fail-fast.
        retry-exception-predicate: com.example.gwp.orchestrator.adapter.kubernetes.RetryableExceptionPredicate
    instances:
      k8s:
        base-config: default
        # K8s API 가 throttle (429) 을 보낼 때는 더 길게 backoff — 일반 4xx 와 구분
        # 하지 않고 같은 default 로 처리. predicate 가 4xx 를 거른 후 남는 5xx / network
        # 만 retry.
      kafka:
        # Kafka producer 자체가 retries=5 로 idempotent retry 하지만, broker 에 갈 때까지
        # 의 connection-level 오류까지는 못 잡음. 추가 한 겹 retry — 더 짧은 wait.
        base-config: default
        max-attempts: 3
        wait-duration: 200ms

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:orchestrator}
    username: ${DB_USER:orchestrator}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    # 공통 마이그레이션 + PG 전용(partial index 등) 동시 적용
    locations: classpath:db/migration,classpath:db/migration-postgres
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI}

management:
  tracing:
    sampling:
      probability: 0.1

gwp:
  kubernetes:
    enabled: true
  storage:
    enabled: true
  security:
    jwt:
      enabled: true
  outbox:
    relay:
      enabled: true
  quota:
    advisory-lock-enabled: true   # 다중 인스턴스 / Postgres — owner 단위 over-commit race 차단
  leader:
    # prod: K8s Lease 가 단일 leader 보장 — Pod 죽으면 lease 만료 후 즉시 takeover.
    # ShedLock 도 같이 살아있지만 (호환성) 실질적인 직렬화는 lease 가 함.
    mode: lease
