spring:
  application:
    name: orchestrator-api
  datasource:
    url: jdbc:h2:mem:orchestrator;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple   # 로컬 dev: in-memory ConcurrentMapCacheManager
  kafka:
    # autoconfigure 가 동작하려면 bootstrap-servers 가 있어야 함. 로컬에선 미사용 (publisher 가 noop)
    bootstrap-servers: ${KAFKA_BOOTSTRAP:}
    producer:
      acks: all
      retries: 5
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # Timer 들에 percentile-histogram 활성 → bucket 으로 export → Prometheus exemplar
      # 가 bucket 마다 trace_id 를 attach 가능 (ADR-0019). 개별 timer 는 코드에서
      # publishPercentileHistogram() / serviceLevelObjectives(...) 로 SLO bucket 명시.
      percentiles-histogram:
        gwp_orchestrator_job_submit_seconds: true
        gwp_orchestrator_dispatch_latency_seconds: true
  tracing:
    sampling:
      probability: 1.0
    # W3C Trace Context (RFC 9.5) — Kafka header / HTTP header 모두 같은 표준 포맷.
    # ADR-0018 참고. B3 (Zipkin 호환) 도 같이 켜면 legacy consumer 까지 호환되지만,
    # 이 시스템은 신규라 W3C 단일 포맷으로 통일 — 헤더 양 절반.
    propagation:
      type: w3c
    # Baggage 자동 propagation (RFC 9.5.3 의 'baggage' 헤더) — JobBaggage.ALLOWED 화이트리스트의
    # 키만 자동으로 inbound HTTP header / outbound HTTP / Kafka 로 흐른다. ADR-0021 참고.
    # remote-fields: trace 가 *옆 서비스* 에서 흘러올 때 그 서비스가 박은 baggage 중 받을 키.
    # correlation-fields: 받은 baggage 중 MDC 에 자동 미러링할 키 (로그 라인 라벨에 박힘).
    # tag-fields: span tag 로도 동시 노출 — Tempo / Jaeger UI 에서 검색 가능.
    baggage:
      remote-fields:
        - owner
        - cost-center
        - priority
      correlation:
        enabled: true
        fields:
          - owner
          - cost-center
          - priority
      tag-fields:
        - owner
        - cost-center
        - priority
  prometheus:
    metrics:
      export:
        # Prometheus 스크레이프 응답 (/actuator/prometheus) 에 histogram bucket 별 exemplar
        # 가 OpenMetrics 포맷으로 함께 노출되도록. Spring Boot 3.3 가 Tracer 빈이 있으면
        # 자동으로 SpanContext 를 만들어 PrometheusMeterRegistry 에 wiring.
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

gwp:
  kubernetes:
    enabled: false
    namespace: gwp-jobs
    job-ttl-seconds: 86400
    callback-url: http://orchestrator-api.gwp.svc.cluster.local:8080/internal/jobs
  storage:
    enabled: false
    presign-ttl-seconds: 3600
  callback:
    shared-secret: ${GWP_CALLBACK_SECRET:dev-secret-change-me}
  security:
    jwt:
      enabled: false   # 로컬 dev: PermissiveSecurityConfig 활성. 운영에서 true.
  outbox:
    relay:
      # 로컬 dev 는 Kafka 미연결이라 relay 자체를 끔 (false). 운영에서 true.
      # ShedLock 으로 다중 인스턴스 안전성 확보 — 같은 시각에 한 인스턴스만 polling.
      enabled: false
      poll-interval-ms: 1000   # tick 주기 — 이벤트 발생 후 발행까지 평균 0.5초 lag
      batch-size: 100          # 한 tick 에 처리할 메시지 수
      send-timeout-ms: 5000    # Kafka send 응답 대기 — 이걸 초과하면 실패 처리
      topic-prefix: "gwp."     # 토픽: gwp.{aggregateType}.{eventType} (예: gwp.job.submitted)
      max-attempts: 10         # 이 횟수 초과 시 메시지를 DLQ 로 격리 (poison pill 방어)
  quota:
    default-max-concurrent-jobs: 10
    default-max-gpu-count: 16
    advisory-lock-enabled: false   # H2 dev: 단일 인스턴스라 race 없음. prod 에서 true.
  leader:
    # 다중 인스턴스 leader election 모드:
    #   shedlock — ShedLock @SchedulerLock 만으로 직렬화 (DB row 락). H2/dev 기본.
    #   lease    — K8s coordination.k8s.io/Lease 사용. prod 권장.
    # 비-리더 인스턴스는 스케줄러 진입을 즉시 return — 락 경쟁 비용도 안 듦.
    mode: shedlock
    namespace: gwp
    lease-name: gwp-orchestrator-leader
    # K8s Downward API 로 metadata.name 을 환경변수에 주입해 채우는 게 운영 컨벤션.
    # 누락 시 hostname 으로 fallback (KubernetesLeaseLeaderElector 가 처리).
    identity: ${POD_NAME:}
    # kube-controller-manager 표준 비율 (15s / 10s / 2s) — network blip 흡수와 takeover
    # 속도의 트레이드오프. 너무 짧으면 churn (잦은 전환), 너무 길면 SLA 영향.
    lease-duration-seconds: 15
    renew-deadline-seconds: 10
    retry-period-seconds: 2

logging:
  pattern:
    # MDC 키들이 모든 로그 라인에 박힘 — owner / cost-center 는 baggage 에서 자동 미러링
    # 되어 cross-system 로그 검색이 자동 가능 (ADR-0021).
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{requestId:-},owner=%X{owner:-},cc=%X{cost-center:-}]"

resilience4j:
  circuitbreaker:
    # 회로 (circuit) 의 3 상태 — 상태 머신:
    #   CLOSED    → 정상. 모든 호출 통과. 실패 / slow 비율 집계.
    #   OPEN      → 장애 감지. 호출 즉시 fast-fail (CallNotPermittedException).
    #   HALF_OPEN → 복구 시도 중. 일부 호출만 허용해서 결과 보고 CLOSED / OPEN 결정.
    #
    # 전이 조건:
    #   CLOSED → OPEN     : sliding-window 안의 failure-rate 또는 slow-call-rate 가 임계 초과.
    #   OPEN → HALF_OPEN  : wait-duration-in-open-state 만큼 기다린 뒤 자동 전이.
    #   HALF_OPEN → CLOSED: 허용된 호출 (permitted-number-of-calls-in-half-open-state) 이 대부분 성공.
    #   HALF_OPEN → OPEN  : 허용된 호출 중 임계 초과 실패.
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20             # 최근 20번 호출의 결과로 집계
        minimum-number-of-calls: 10         # 최소 표본 — 호출 수가 적으면 비율 계산 의미 X
        failure-rate-threshold: 50          # %  — 50% 이상 실패하면 OPEN
        slow-call-rate-threshold: 50        # %  — 50% 이상 느리면 OPEN
        slow-call-duration-threshold: 5s    # 이보다 느린 호출은 slow 로 카운트
        wait-duration-in-open-state: 30s    # OPEN 상태 유지 시간 — 그 사이 호출은 fast-fail
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      kafka:
        # Kafka broker 호출용. broker 가 죽었을 때 OutboxRelay 가 send_timeout 5초씩 hang
        # 하는 대신 즉시 fail → 한 tick 이 빠르게 끝나고 attempt 카운터만 1씩 증가.
        base-config: default
      k8s:
        # K8s API 호출용. dispatch / cancel 등 — 응답이 종종 느려 slow 임계 ↑.
        base-config: default
        slow-call-duration-threshold: 10s

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:orchestrator}
    username: ${DB_USER:orchestrator}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    # 공통 마이그레이션 + PG 전용(partial index 등) 동시 적용
    locations: classpath:db/migration,classpath:db/migration-postgres
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI}

management:
  tracing:
    sampling:
      probability: 0.1

gwp:
  kubernetes:
    enabled: true
  storage:
    enabled: true
  security:
    jwt:
      enabled: true
  outbox:
    relay:
      enabled: true
  quota:
    advisory-lock-enabled: true   # 다중 인스턴스 / Postgres — owner 단위 over-commit race 차단
  leader:
    # prod: K8s Lease 가 단일 leader 보장 — Pod 죽으면 lease 만료 후 즉시 takeover.
    # ShedLock 도 같이 살아있지만 (호환성) 실질적인 직렬화는 lease 가 함.
    mode: lease
