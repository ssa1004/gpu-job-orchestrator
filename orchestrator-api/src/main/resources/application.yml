spring:
  application:
    name: orchestrator-api
  datasource:
    url: jdbc:h2:mem:orchestrator;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple   # 로컬 dev: in-memory ConcurrentMapCacheManager
  kafka:
    # autoconfigure 가 동작하려면 bootstrap-servers 가 있어야 함. 로컬에선 미사용 (publisher 가 noop)
    bootstrap-servers: ${KAFKA_BOOTSTRAP:}
    producer:
      acks: all
      retries: 5
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

gwp:
  kubernetes:
    enabled: false
    namespace: gwp-jobs
    job-ttl-seconds: 86400
    callback-url: http://orchestrator-api.gwp.svc.cluster.local:8080/internal/jobs
  storage:
    enabled: false
    presign-ttl-seconds: 3600
  callback:
    shared-secret: ${GWP_CALLBACK_SECRET:dev-secret-change-me}
  security:
    jwt:
      enabled: false   # 로컬 dev: PermissiveSecurityConfig 활성. 운영에서 true.
  outbox:
    relay:
      # 로컬 dev 는 Kafka 미연결이라 relay 자체를 끔 (false). 운영에서 true.
      # ShedLock 으로 다중 인스턴스 안전성 확보 — 같은 시각에 한 인스턴스만 polling.
      enabled: false
      poll-interval-ms: 1000   # tick 주기 — 이벤트 발생 후 발행까지 평균 0.5초 lag
      batch-size: 100          # 한 tick 에 처리할 메시지 수
      send-timeout-ms: 5000    # Kafka send 응답 대기 — 이걸 초과하면 실패 처리
      topic-prefix: "gwp."     # 토픽: gwp.{aggregateType}.{eventType} (예: gwp.job.submitted)
      max-attempts: 10         # 이 횟수 초과 시 메시지를 DLQ 로 격리 (poison pill 방어)
  quota:
    default-max-concurrent-jobs: 10
    default-max-gpu-count: 16
    advisory-lock-enabled: false   # H2 dev: 단일 인스턴스라 race 없음. prod 에서 true.

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{requestId:-}]"

resilience4j:
  circuitbreaker:
    # 회로 (circuit) 의 3 상태 — 상태 머신:
    #   CLOSED    → 정상. 모든 호출 통과. 실패 / slow 비율 집계.
    #   OPEN      → 장애 감지. 호출 즉시 fast-fail (CallNotPermittedException).
    #   HALF_OPEN → 복구 시도 중. 일부 호출만 허용해서 결과 보고 CLOSED / OPEN 결정.
    #
    # 전이 조건:
    #   CLOSED → OPEN     : sliding-window 안의 failure-rate 또는 slow-call-rate 가 임계 초과.
    #   OPEN → HALF_OPEN  : wait-duration-in-open-state 만큼 기다린 뒤 자동 전이.
    #   HALF_OPEN → CLOSED: 허용된 호출 (permitted-number-of-calls-in-half-open-state) 이 대부분 성공.
    #   HALF_OPEN → OPEN  : 허용된 호출 중 임계 초과 실패.
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20             # 최근 20번 호출의 결과로 집계
        minimum-number-of-calls: 10         # 최소 표본 — 호출 수가 적으면 비율 계산 의미 X
        failure-rate-threshold: 50          # %  — 50% 이상 실패하면 OPEN
        slow-call-rate-threshold: 50        # %  — 50% 이상 느리면 OPEN
        slow-call-duration-threshold: 5s    # 이보다 느린 호출은 slow 로 카운트
        wait-duration-in-open-state: 30s    # OPEN 상태 유지 시간 — 그 사이 호출은 fast-fail
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      kafka:
        # Kafka broker 호출용. broker 가 죽었을 때 OutboxRelay 가 send_timeout 5초씩 hang
        # 하는 대신 즉시 fail → 한 tick 이 빠르게 끝나고 attempt 카운터만 1씩 증가.
        base-config: default
      k8s:
        # K8s API 호출용. dispatch / cancel 등 — 응답이 종종 느려 slow 임계 ↑.
        base-config: default
        slow-call-duration-threshold: 10s

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:orchestrator}
    username: ${DB_USER:orchestrator}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    # 공통 마이그레이션 + PG 전용(partial index 등) 동시 적용
    locations: classpath:db/migration,classpath:db/migration-postgres
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI}

management:
  tracing:
    sampling:
      probability: 0.1

gwp:
  kubernetes:
    enabled: true
  storage:
    enabled: true
  security:
    jwt:
      enabled: true
  outbox:
    relay:
      enabled: true
  quota:
    advisory-lock-enabled: true   # 다중 인스턴스 / Postgres — owner 단위 over-commit race 차단
