apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-api
  namespace: gwp
  labels:
    app.kubernetes.io/name: orchestrator-api
    app.kubernetes.io/part-of: gwp-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # API 가 stateless 라 surge OK. PDB 와 함께 운영 시 zero-downtime.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: orchestrator-api
      # 보안: non-root + read-only root FS + drop all capabilities
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: orchestrator-api
          image: ghcr.io/your-org/orchestrator-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            # K8s Lease leader election (ADR-0017) 의 holderIdentity. Downward API 로
            # Pod 이름을 주입 → lease 의 spec.holderIdentity 에 박혀 kubectl 로 *지금
            # 누가 리더인지* 확인 가능.
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: DB_HOST
              valueFrom:
                configMapKeyRef: { name: orchestrator-api-config, key: db.host }
            - name: DB_NAME
              valueFrom:
                configMapKeyRef: { name: orchestrator-api-config, key: db.name }
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: orchestrator-api-secret, key: db.user }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: orchestrator-api-secret, key: db.password }
            - name: OAUTH_ISSUER_URI
              valueFrom:
                configMapKeyRef: { name: orchestrator-api-config, key: oauth.issuer-uri }
            # Callback secret. orchestrator-api 자체는 env var OK (Pod 안에서만 읽힘).
            # 워커 Pod 으로 전파될 때는 KubernetesJobDispatcher 가 valueFrom.secretKeyRef 로
            # K8s Secret 참조하여 평문 노출 최소화 (Batch 7 / M2).
            - name: GWP_CALLBACK_SECRET
              valueFrom:
                secretKeyRef: { name: orchestrator-api-secret, key: callback.secret }
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef: { name: orchestrator-api-config, key: kafka.bootstrap }
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef: { name: orchestrator-api-config, key: redis.host }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.observability.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: orchestrator-api
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          # 3종 probe — ADR-0023 참고. 각자 의미가 달라 같이 명시되어야 한다.
          # startupProbe: Spring 시작이 느려도 livenessProbe 가 일찍 fail 시키지 않도록.
          # 이 동안 livenessProbe / readinessProbe 는 *완전히 disabled* — failureThreshold
          # × periodSeconds = 30 × 5 = 150s 안에 startup 이 끝나야 한다.
          startupProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          # readinessProbe: 트래픽 받을 준비. fail 이면 Service endpoint 에서 빠짐 (재시작 X).
          # ApplicationReadinessCoordinator 가 외부 의존성 (Kafka / K8s API) 의 회로 OPEN 시
          # unready 로 publish — 일시적 의존성 장애 시 트래픽 차단, 회복 시 자동 ready.
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          # livenessProbe: 프로세스가 살아있는가. fail 이면 K8s 가 Pod 재시작.
          # /actuator/health/liveness 는 ApplicationContext 가 살아있고 LivenessState 가
          # CORRECT 일 때만 200. 외부 의존성 (DB / Kafka) 은 일부러 안 본다 — 그건 readiness 책임.
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              # readiness=unready 가 service mesh / kube-proxy 까지 propagate 되는 시간 (~5s).
              # 이 동안에도 SIGTERM 이 컨테이너에 전달되지 않으므로 in-flight 처리는 계속.
              # ADR-0024 의 단계별 흐름 참고.
              exec:
                command: ["sh", "-c", "sleep 5"]
      volumes:
        - name: tmp
          emptyDir: {}   # readOnlyRootFilesystem 가 true 라 /tmp 는 별도 마운트 필요
      # SIGTERM 후 30s. preStop 5s + Spring graceful 25s = 30s 에 맞춰 SIGKILL 안 닿게.
      terminationGracePeriodSeconds: 30
---
# 무중단 보장: rolling update 시에도 최소 1 Pod 유지
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: orchestrator-api
  namespace: gwp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator-api
