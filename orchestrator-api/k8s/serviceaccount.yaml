apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator-api
  namespace: gwp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-api-job-manager
  namespace: gwp-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-api-job-manager
  namespace: gwp-jobs
subjects:
  - kind: ServiceAccount
    name: orchestrator-api
    namespace: gwp
roleRef:
  kind: Role
  name: orchestrator-api-job-manager
  apiGroup: rbac.authorization.k8s.io
