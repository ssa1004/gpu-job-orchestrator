apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator-api
  namespace: gwp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-api-job-manager
  namespace: gwp-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-api-job-manager
  namespace: gwp-jobs
subjects:
  - kind: ServiceAccount
    name: orchestrator-api
    namespace: gwp
roleRef:
  kind: Role
  name: orchestrator-api-job-manager
  apiGroup: rbac.authorization.k8s.io
---
# Leader election (ADR-0017) — coordination.k8s.io/Lease 리소스에 대한 자기 namespace 권한.
# fabric8 LeaderElector 가 lease 를 acquire / renew / release 하기 위해 필요.
# kube-controller-manager 와 동일한 verb 셋. namespace=gwp 로 제한 → 권한 폭증 방지.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-api-leader-election
  namespace: gwp
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-api-leader-election
  namespace: gwp
subjects:
  - kind: ServiceAccount
    name: orchestrator-api
    namespace: gwp
roleRef:
  kind: Role
  name: orchestrator-api-leader-election
  apiGroup: rbac.authorization.k8s.io
