# JVM 메모리 설정 — CI(특히 CodeQL) 에서 Kotlin 컴파일이 OOM 으로 죽지 않도록 명시.
#
# CodeQL build-mode: manual 은 build-tracer 를 LD_PRELOAD 로 끼운 채 compileKotlin 을
# 돌리는데, 이때 CodeQL 이 러너 RAM 의 대부분(CODEQL_RAM)을 분석용으로 잡아두므로
# heap 한계를 명시하지 않은 Kotlin 데몬이 기본값으로 떠서 "java.lang.OutOfMemoryError:
# Java heap space" 로 빌드를 깨뜨렸다. Gradle / Kotlin 데몬 양쪽 heap 을 고정해 둔다.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
kotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
